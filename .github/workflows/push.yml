name: Download and push Ubuntu cloud image to cloud-images registry

on:
  push:
    branches:
      - 'ubuntu'
  pull_request:
    branches:
      - 'ubuntu'

jobs:
  download-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Setup ducttape tool from releases
        uses: ducttape-infra/ducttape-install-action@v1.0

      - name: Push image to registry
        env:
          IMAGE_NAME: ubuntu-cloud
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          BASE_DIR: /home/runner/.local/share/ducttape/base-images
          IMAGE_URL: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
        run: |
          echo "Prepare folders..."
          mkdir -p ${BASE_DIR}

          echo "Downloading image..."
          curl -fSL "${IMAGE_URL}" -o ${BASE_DIR}/${IMAGE_NAME}.qcow2

          echo "Verify ..."
          ls -al ${BASE_DIR}
          sha256sum "${BASE_DIR}/${IMAGE_NAME}.qcow2"

          echo "Pushing image..."
          ducttape push ${IMAGE_NAME} ghcr.io/ducttape-infra/cloud-images/${IMAGE_NAME}:24.04


